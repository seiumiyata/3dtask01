<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Task List - Portable & Persistent</title>
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Persistence Libraries (Cloud Storage) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // モジュールスコープの関数をグローバル(window)に公開して、他のスクリプトから使えるようにします
        window.fbDoc = doc;
        window.fbGetDoc = getDoc;
        window.fbSetDoc = setDoc;

        window.db = null;
        window.auth = null;
        window.user = null;
        window.appId = typeof __app_id !== 'undefined' ? __app_id : '3d-task-app';

        const initPersistence = async () => {
            if (typeof __firebase_config === 'undefined') {
                console.warn("Persistence config not found. Running in local-only mode.");
                // Firebaseがない場合は、即座にローカルロードを開始するイベントを発火
                window.dispatchEvent(new CustomEvent('auth-ready'));
                return;
            }

            try {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                window.auth = getAuth(app);
                window.db = getFirestore(app);

                // Authentication
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(window.auth, __initial_auth_token);
                } else {
                    await signInAnonymously(window.auth);
                }

                onAuthStateChanged(window.auth, (u) => {
                    window.user = u;
                    if (u) {
                        window.dispatchEvent(new CustomEvent('auth-ready'));
                    }
                });
            } catch (err) {
                console.error("Persistence init failed:", err);
            }
        };

        initPersistence();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+JP:wght@300;500;700&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #020617; }
        canvas { display: block; }
        .interactive { pointer-events: auto; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #input-container {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #input-container:hover, #input-container.focused {
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
            background: rgba(15, 23, 42, 0.6);
        }
        
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #38bdf8;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }

        .status-pill {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; }
        .status-dot.active { background: #10b981; box-shadow: 0 0 8px #10b981; }

        .message-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.4);
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        #context-menu {
            position: fixed;
            display: none;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px;
            z-index: 1000;
            min-width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .menu-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #e2e8f0;
            transition: background 0.2s;
        }
        .menu-item:hover { background: rgba(56, 189, 248, 0.2); }
        .menu-item.danger:hover { background: rgba(244, 63, 94, 0.2); color: #fb7185; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="toast" class="message-toast"></div>

<div id="context-menu">
    <div class="text-[10px] text-slate-500 font-bold px-3 py-1 uppercase tracking-wider">カラー変更</div>
    <div class="flex justify-between px-2 py-2 border-b border-white/10 mb-1">
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#38bdf8')"><div class="color-dot bg-sky-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#10b981')"><div class="color-dot bg-emerald-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#f43f5e')"><div class="color-dot bg-rose-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#fbbf24')"><div class="color-dot bg-amber-400"></div></div>
    </div>
    <div class="menu-item danger" onclick="deleteTargetTask()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        タスクを削除
    </div>
</div>

<div id="ui-layer" class="flex flex-col justify-between p-8 text-white">
    <div class="flex justify-between items-start">
        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">3D TASK CLOUD</h1>
            <div class="flex items-center gap-3">
                <div class="status-pill">
                    <div id="save-status-dot" class="status-dot"></div>
                    <span id="save-status-text">オフライン</span>
                </div>
                <p class="text-slate-500 text-xs">ドラッグで移動 / スクロールで奥行き</p>
            </div>
        </div>
        <button id="export-btn" class="interactive bg-sky-600 hover:bg-sky-500 transition px-6 py-2 rounded-full font-medium shadow-lg flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Excel出力
        </button>
    </div>

    <div class="flex flex-col items-center mb-12">
        <div id="input-container" class="interactive w-full max-w-2xl p-6 rounded-3xl flex flex-col items-center cursor-text">
            <div id="input-display" class="text-3xl font-light tracking-wide min-h-[3.5rem] text-center w-full break-all text-sky-50 flex items-center justify-center">
                <span class="text-slate-600 italic">新しいタスクを入力...</span><span class="cursor-blink"></span>
            </div>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autocomplete="off" style="position:fixed; opacity:0; top:-100px;">

<script>
    // --- Configuration & State ---
    let scene, camera, renderer, raycaster, mouse;
    const taskObjects = [];
    let selectedObject = null;
    let draggedObject = null;
    let menuTargetTask = null; 
    let offset = new THREE.Vector3(); // 追加: ドラッグ時のオフセット計算用
    let plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    let isComposing = false;
    let isInitialLoadComplete = false;

    const hiddenInput = document.getElementById('hidden-input');
    const inputDisplay = document.getElementById('input-display');
    const inputContainer = document.getElementById('input-container');
    const contextMenu = document.getElementById('context-menu');
    const saveStatusDot = document.getElementById('save-status-dot'); // 追加: ステータス表示用
    const saveStatusText = document.getElementById('save-status-text'); // 追加: ステータス表示用

    // --- Persistence Logic ---
    async function saveAllToCloud() {
        const data = taskObjects.map(obj => ({
            text: obj.text,
            createdAt: obj.createdAt,
            color: obj.color || '#38bdf8', // 色情報を追加
            pos: { x: obj.mesh.position.x, y: obj.mesh.position.y, z: obj.mesh.position.z },
            id: obj.id || crypto.randomUUID()
        }));

        // Firebaseが利用できない場合はlocalStorageに保存
        if (!window.db || !window.user) {
            localStorage.setItem('3d_tasks_local', JSON.stringify(data));
            updateStatus(true);
            return;
        }
        
        try {
            const userDoc = window.fbDoc(window.db, 'artifacts', window.appId, 'users', window.user.uid, 'settings', 'tasks');
            await window.fbSetDoc(userDoc, { tasks: data });
            updateStatus(true);
        } catch (e) {
            console.error("Save failed", e);
            updateStatus(false);
        }
    }

    async function loadFromCloud() {
        // Firebaseが利用できない場合はlocalStorageから読み込み
        if (!window.db || !window.user) {
            const localData = localStorage.getItem('3d_tasks_local');
            if (localData) {
                const data = JSON.parse(localData);
                data.forEach(t => addTask(t.text, t.createdAt, t.pos, t.id));
            }
            isInitialLoadComplete = true;
            updateStatus(true);
            return;
        }
        
        try {
            const userDoc = window.fbDoc(window.db, 'artifacts', window.appId, 'users', window.user.uid, 'settings', 'tasks');
            const snap = await window.fbGetDoc(userDoc);
            if (snap.exists()) {
                const data = snap.data().tasks || [];
                data.forEach(t => addTask(t.text, t.createdAt, t.pos, t.id, t.color)); // colorを渡す
                isInitialLoadComplete = true;
                updateStatus(true);
            }
        } catch (e) {
            console.error("Load failed", e);
        }
    }

    function updateStatus(isSynced) {
        saveStatusDot.className = `status-dot ${isSynced ? 'active' : ''}`;
        saveStatusText.innerText = isSynced ? '保存済み' : '同期中...';
    }

    // --- Three.js Logic ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        scene.fog = new THREE.Fog(0x020617, 10, 35);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x38bdf8, 2);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Grid for depth perception
        const grid = new THREE.GridHelper(100, 100, 0x1e293b, 0x0f172a);
        grid.position.y = -12;
        scene.add(grid);

        window.addEventListener('resize', onResize);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mouseup', onMouseUp);
        window.addEventListener('contextmenu', onContextMenu); // 右クリック追加
        window.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('click', () => contextMenu.style.display = 'none');
        
        window.addEventListener('auth-ready', loadFromCloud);

        setupInput();
        animate();
    }

    function setupInput() {
        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('button')) hiddenInput.focus();
        });

        hiddenInput.addEventListener('focus', () => inputContainer.classList.add('focused'));
        hiddenInput.addEventListener('blur', () => inputContainer.classList.remove('focused'));
        hiddenInput.addEventListener('compositionstart', () => isComposing = true);
        hiddenInput.addEventListener('compositionend', () => isComposing = false);

        hiddenInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const cursor = '<span class="cursor-blink"></span>';
            inputDisplay.innerHTML = val ? `<span>${val}</span>${cursor}` : `<span class="text-slate-600 italic">新しいタスクを入力...</span>${cursor}`;
        });

        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isComposing && hiddenInput.value.trim()) {
                addTask(hiddenInput.value.trim());
                hiddenInput.value = '';
                inputDisplay.innerHTML = `<span class="text-slate-600 italic">新しいタスクを入力...</span><span class="cursor-blink"></span>`;
                saveAllToCloud();
            }
        });

        document.getElementById('export-btn').addEventListener('click', exportToExcel);
    }

    function createTextTexture(text, color = '#38bdf8') {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; canvas.height = 256;
        
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = color; // 指定された色で枠線を描画
        ctx.lineWidth = 20;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 85px "Noto Sans JP", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const display = text.length > 20 ? text.substring(0, 17) + "..." : text;
        ctx.fillText(display, 512, 128);

        const tex = new THREE.CanvasTexture(canvas);
        tex.minFilter = THREE.LinearFilter;
        return tex;
    }

    function addTask(text, createdAt = null, pos = null, id = null, color = '#38bdf8') {
        const geometry = new THREE.BoxGeometry(8, 1.8, 0.4);
        const material = new THREE.MeshPhongMaterial({
            map: createTextTexture(text, color),
            emissive: color,
            emissiveIntensity: 0.1,
            transparent: true,
            opacity: 0.95
        });

        const mesh = new THREE.Mesh(geometry, material);
        
        if (pos) {
            mesh.position.set(pos.x, pos.y, pos.z);
        } else {
            mesh.position.set((Math.random() - 0.5) * 5, 10, (Math.random() - 0.5) * 2);
        }

        scene.add(mesh);

        const task = {
            id: id || crypto.randomUUID(),
            mesh,
            text,
            color, // 色情報を保持
            createdAt: createdAt || new Date().toLocaleString('ja-JP'),
            targetY: pos ? pos.y : (taskObjects.length * -2.2 + 5)
        };

        taskObjects.push(task);
        if (!pos) saveAllToCloud();
    }

    function onContextMenu(e) {
        e.preventDefault();
        
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(taskObjects.map(o => o.mesh));

        if (intersects.length > 0) {
            const hit = intersects[0].object;
            menuTargetTask = taskObjects.find(o => o.mesh === hit);
            
            contextMenu.style.display = 'block';
            contextMenu.style.left = `${e.clientX}px`;
            contextMenu.style.top = `${e.clientY}px`;
        } else {
            contextMenu.style.display = 'none';
        }
    }

    window.deleteTargetTask = function() {
        if (!menuTargetTask) return;
        
        scene.remove(menuTargetTask.mesh);
        const index = taskObjects.indexOf(menuTargetTask);
        if (index > -1) {
            taskObjects.splice(index, 1);
        }
        
        contextMenu.style.display = 'none';
        toast("タスクを削除しました");
        saveAllToCloud();
    };

    window.changeColor = function(newColor) {
        if (!menuTargetTask) return;
        
        menuTargetTask.color = newColor;
        menuTargetTask.mesh.material.map = createTextTexture(menuTargetTask.text, newColor);
        menuTargetTask.mesh.material.emissive.set(newColor);
        
        contextMenu.style.display = 'none';
        saveAllToCloud();
    };

    function onMouseMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        if (draggedObject) {
            raycaster.setFromCamera(mouse, camera);
            const intersectPoint = new THREE.Vector3();
            plane.constant = -draggedObject.mesh.position.z;
            if (raycaster.ray.intersectPlane(plane, intersectPoint)) {
                draggedObject.mesh.position.copy(intersectPoint.sub(offset));
                draggedObject.targetY = draggedObject.mesh.position.y;
            }
        }
    }

    function onMouseDown() {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(taskObjects.map(o => o.mesh));

        if (intersects.length > 0) {
            const hit = intersects[0].object;
            const obj = taskObjects.find(o => o.mesh === hit);
            
            if (selectedObject) selectedObject.mesh.material.emissiveIntensity = 0.1;
            selectedObject = obj;
            selectedObject.mesh.material.emissiveIntensity = 0.8;
            draggedObject = obj;

            plane.constant = -draggedObject.mesh.position.z;
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);
            offset.copy(intersectPoint).sub(draggedObject.mesh.position);
        } else {
            if (selectedObject) selectedObject.mesh.material.emissiveIntensity = 0.1;
            selectedObject = null;
        }
    }

    function onMouseUp() {
        if (draggedObject) saveAllToCloud();
        draggedObject = null;
    }

    function onWheel(e) {
        if (selectedObject) {
            e.preventDefault();
            const delta = e.deltaY * -0.015;
            const nextZ = selectedObject.mesh.position.z + delta;
            if (nextZ > -15 && nextZ < 10) {
                selectedObject.mesh.position.z = nextZ;
                saveAllToCloud();
            }
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        taskObjects.forEach((obj, i) => {
            if (draggedObject !== obj) {
                obj.mesh.position.y += (obj.targetY - obj.mesh.position.y) * 0.1;
            }
            if (selectedObject !== obj) {
                obj.mesh.rotation.y = Math.sin(time * 0.5 + i) * 0.05;
                obj.mesh.position.x += Math.cos(time * 0.8 + i) * 0.002;
            }
        });

        if (!draggedObject) {
            camera.position.x += (mouse.x * 2 - camera.position.x) * 0.05;
            camera.position.y += ((-mouse.y * 1.5) - camera.position.y) * 0.05;
        }
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
    }

    function exportToExcel() {
        if (taskObjects.length === 0) return toast("タスクがありません");
        const data = taskObjects.map(o => ({
            "タスク": o.text,
            "作成日": o.createdAt,
            "優先度(Z)": Math.round(o.mesh.position.z * 10) / 10
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Tasks");
        XLSX.writeFile(wb, `3D_Tasks_${new Date().toLocaleDateString()}.xlsx`);
        toast("Excelを出力しました");
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 3000);
    }

    window.onload = init;
</script>
</body>
</html>
