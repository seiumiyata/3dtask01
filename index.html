<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Task List - Portable & Persistent</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Persistence & Application Logic -->
    <script type="module" src="js/persistence.js"></script>
    <script src="js/main.js" defer></script>
</head>
<body>

<div id="toast" class="message-toast"></div>

<div id="context-menu">
    <div class="text-[10px] text-slate-500 font-bold px-3 py-1 uppercase tracking-wider">カラー変更</div>
    <div class="flex justify-between px-2 py-2 border-b border-white/10 mb-1">
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#38bdf8')"><div class="color-dot bg-sky-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#10b981')"><div class="color-dot bg-emerald-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#f43f5e')"><div class="color-dot bg-rose-400"></div></div>
        <div class="menu-item !p-1 hover:!bg-transparent" onclick="changeColor('#fbbf24')"><div class="color-dot bg-amber-400"></div></div>
    </div>
    <div class="menu-item danger" onclick="deleteTargetTask()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        タスクを削除
    </div>
</div>

<div id="ui-layer" class="flex flex-col justify-between p-8 text-white">
    <div class="flex justify-between items-start">
        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">3D TASK CLOUD</h1>
            <div class="flex items-center gap-3">
                <div class="status-pill">
                    <div id="save-status-dot" class="status-dot"></div>
                    <span id="save-status-text">オフライン</span>
                </div>
                <p class="text-slate-500 text-xs">ドラッグで移動 / スクロールで奥行き</p>
            </div>
        </div>
        <button id="export-btn" class="interactive bg-sky-600 hover:bg-sky-500 transition px-6 py-2 rounded-full font-medium shadow-lg flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Excel出力
        </button>
    </div>

    <div class="flex flex-col items-center mb-12">
        <div id="input-container" class="interactive w-full max-w-2xl p-6 rounded-3xl flex flex-col items-center cursor-text">
            <div id="input-display" class="text-3xl font-light tracking-wide min-h-[3.5rem] text-center w-full break-all text-sky-50 flex items-center justify-center">
                <span class="text-slate-600 italic">新しいタスクを入力...</span><span class="cursor-blink"></span>
            </div>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autocomplete="off" style="position:fixed; opacity:0; top:-100px;">

</body>
</html>
